# Local-dev sync backend for MCAT (desktop + iOS).
#
#   Bring up:  just sync-server
#              (docker compose -f tools/syncserver/docker-compose.yml up --build)
#   Health:    curl http://localhost:8080/health
#   Data:      persisted in the named volume `mcat-sync-data` (per-user
#              collection at <volume>/<username>/collection.anki2)
#
# Override credentials without editing this file:
#   SYNC_USER1=me:secret just sync-server
#
# The `mcat-tools` service below runs the FastAPI/uvicorn sidecar
# (tools/syncserver/mcat_tools/) for the new Read/Practice tab HTTP endpoints
# (/read/passage, /practice/questions, /metrics/compute, /health, /version —
# see contracts/api.md in the 2026-07-02-read-practice-tabs factory run) on
# port 8081. It loads its secrets from an untracked tools/syncserver/.env
# file — copy tools/syncserver/env.example to get started. See
# tools/syncserver/README.md for details.
name: mcat-syncserver

services:
  syncserver:
    build:
      context: ../..
      dockerfile: tools/syncserver/Dockerfile
    image: mcat-sync-server:local
    container_name: mcat-syncserver
    environment:
      # username:password. Add SYNC_USER2, SYNC_USER3, … for more accounts.
      SYNC_USER1: ${SYNC_USER1:-mcat:mcat}
      SYNC_HOST: 0.0.0.0
      SYNC_PORT: "8080"
      SYNC_BASE: /anki_data
      RUST_LOG: ${RUST_LOG:-anki=info}
    ports:
      - "8080:8080"
    volumes:
      - mcat-sync-data:/anki_data
    restart: unless-stopped

  # Sidecar for the new Read/Practice tab endpoints. Runs the real
  # `mcat_tools` FastAPI app (tools/syncserver/mcat_tools/) via uvicorn on
  # port 8081, built from tools/syncserver/mcat-tools.Dockerfile with deps
  # from tools/syncserver/requirements-mcat-tools.txt. Standalone service,
  # not proxied through qt/aqt/mediasrv.py.
  mcat-tools:
    build:
      context: ../..
      dockerfile: tools/syncserver/mcat-tools.Dockerfile
    image: mcat-tools:local
    container_name: mcat-tools
    env_file:
      # `required: false` so `docker compose config`/`up` doesn't hard-fail
      # when tools/syncserver/.env hasn't been created yet (e.g. CI, or a
      # dev relying solely on shell-exported vars below).
      - path: .env
        required: false
    environment:
      # Required secrets below default to empty so misconfiguration fails
      # loud rather than silently working with an unset key. NEWS_API_KEY
      # is optional (only used if the news-API passage tier is reached).
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      MCAT_TOOLS_TOKEN: ${MCAT_TOOLS_TOKEN:-}
    ports:
      # 8081, distinct from syncserver's 8080.
      - "8081:8081"
    restart: unless-stopped

volumes:
  mcat-sync-data:
